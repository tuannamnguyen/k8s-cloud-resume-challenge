apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-ecom-app
  template:
    metadata:
      labels:
        app: my-ecom-app
    spec:
      containers:
      - name: ecom-container
        image: tuannamnguyen290602/ecom-web:v1
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8000
