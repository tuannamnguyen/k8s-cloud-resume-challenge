apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-deployment
spec:
  selector:
    matchLabels:
      app: my-ecom-app
  template:
    metadata:
      labels:
        app: my-ecom-app
    spec:
      containers:
      - name: ecom-container
        image: tuannamnguyen290602/ecom-web:v4
        env:
          - name: HERO_HEADING
            valueFrom:
              configMapKeyRef:
                key: hero_heading
                name: my-ecom-app-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
          limits:
            memory: "128Mi"

        ports:
        - containerPort: 8000
