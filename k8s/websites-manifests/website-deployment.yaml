apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-deployment
spec:
  selector:
    matchLabels:
      app: my-ecom-app
  template:
    metadata:
      labels:
        app: my-ecom-app
    spec:
      containers:
        - name: ecom-container
          image: tuannamnguyen290602/ecom-web:v5
          env:
            - name: HERO_HEADING
              valueFrom:
                configMapKeyRef:
                  key: hero_heading
                  name: my-ecom-app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
            limits:
              memory: "128Mi"
          livenessProbe:
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 3
            timeoutSeconds: 3
            httpGet:
              path: /healthz
              port: 8000
          ports:
            - containerPort: 8000
