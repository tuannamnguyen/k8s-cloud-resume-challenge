services:
  app:
    build:
      context: .
    # command: ["php", "-S", "0.0.0.0:8000", "-t", "/var/www/html"]
    ports:
      - "8000:8000"
    env_file: ".env"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: ecomdb
      MARIADB_USER: ecomuser
      MARIADB_PASSWORD: ecompassword
    volumes:
      - db-data:/var/lib/mysql
      - ./db-load-script.sql:/docker-entrypoint-initdb.d/db-load-script.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
